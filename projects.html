<!doctype html>
<html>
	<head>
		<script src="/.nekoweb-api/static/site.js" defer></script>
		<meta charset="UTF-8" />
		<title>проекты :d</title>
		<link rel="icon" href="favicon.png" type="image/png" />

		<script type="text/javascript">
			var titleText = "    проекты))    ";
			function scrollTitle() {
			    titleText = titleText.substring(1, titleText.length) + titleText.substring(0, 1);
			    document.title = titleText;
			    setTimeout(scrollTitle, 200);
			}
		</script>

		<style>
			body {
			    background-image: url('bg3.jpg');
			    background-size: cover;
			    background-attachment: fixed;
			    background-position: center;
			    background-repeat: no-repeat;
			    margin: 0;
			    font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
			    color: #f0f0f0;
			    text-align: center;
			    letter-spacing: 0.5px;
			}

			/* навигация */
			nav {
			    position: relative;
			    padding: 25px 15px;
			    margin-bottom: 20px;
			    border-bottom: 2px solid rgba(255, 255, 255, 0.2);
			    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
			    overflow: hidden;
			    background: rgba(0, 0, 0, 0.3);
			}

			nav::before {
			    content: "";
			    position: absolute;
			    top: 0; left: 0; right: 0; bottom: 0;
			    background-image: url('assets/aero.png');
			    background-size: auto;
			    background-repeat: repeat-x;
			    background-position: center;
			    opacity: 0.4;
			    z-index: 0;
			}

			nav a {
			    position: relative;
			    z-index: 1;
			    color: white;
			    text-decoration: none;
			    margin: 0 20px;
			    font-size: 18px;
			    font-weight: bold;
			    text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
			    transition: 0.3s;
			}

			nav a:hover {
			    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
			    opacity: 0.8;
			}

			.container {
			    max-width: 1000px;
			    margin: 0 auto;
			    padding: 40px 20px;
			    background: rgba(0, 0, 0, 0.4);
			    border-radius: 30px;
			    backdrop-filter: blur(5px);
			}

			h1 { font-weight: lighter; font-size: 52px; text-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
			h2 { font-weight: lighter; font-size: 30px; color: #a0d8ef; margin-bottom: 20px; }

			/* Сетка проектов */
			.projects-grid {
			    display: grid;
			    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
			    gap: 20px;
			    margin-top: 30px;
			}

			/* Карточка проекта в стиле aero */
			.project-card {
			    position: relative;
			    padding: 25px;
			    border-radius: 15px;
			    border: 1px solid rgba(255, 255, 255, 0.2);
			    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
			    overflow: hidden;
			    background: rgba(17, 17, 17, 0.6);
			    text-align: left;
			    transition: transform 0.3s;
			}

			.project-card:hover {
			    transform: scale(1.02);
			    border-color: rgba(160, 216, 239, 0.5);
			}

			.project-card::before {
			    content: "";
			    position: absolute;
			    top: 0; left: 0; right: 0; bottom: 0;
			    background-image: url('assets/aero.png');
			    background-size: auto;
			    background-repeat: no-repeat;
			    background-position: top right;
			    opacity: 0.2;
			    z-index: 0;
			}

			.project-content {
			    position: relative;
			    z-index: 1;
			}

			.project-card h3 {
			    margin-top: 0;
			    color: #a0d8ef;
			    font-size: 24px;
			}

			.project-card p {
			    font-size: 16px;
			    line-height: 1.5;
			    color: #e0e0e0;
			}

			.tag {
			    display: inline-block;
			    background: rgba(160, 216, 239, 0.2);
			    padding: 2px 8px;
			    border-radius: 5px;
			    font-size: 12px;
			    margin-bottom: 10px;
			    border: 1px solid rgba(160, 216, 239, 0.4);
			}

			.btn-link {
			    display: inline-block;
			    margin-top: 15px;
			    padding: 8px 15px;
			    background: rgba(255, 255, 255, 0.1);
			    color: white;
			    text-decoration: none;
			    border-radius: 5px;
			    border: 1px solid rgba(255, 255, 255, 0.2);
			    transition: 0.2s;
			}

			.btn-link:hover {
			    background: rgba(160, 216, 239, 0.3);
			}
		</style>
	</head>
	<body onload="scrollTitle()">
		<nav>
			<a href="index.html">главная</a>
			<a href="about.html">обо мне</a>
			<a href="projects.html">проекты</a>
			<a href="guestbook.html">гостевая</a>
		</nav>

		<div class="container">
			<h1>мои проекты</h1>
			<h2>программное обеспечение и медиа</h2>

			<div class="projects-grid">
				<!-- Prisma -->
				<div class="project-card">
					<div class="project-content">
						<span class="tag">JavaScript</span>
						<h3>Prisma</h3>
						<p>Кастомный браузер для windows 96 в стиле IE 7/8</p>
						<a href="#" class="btn-link">в разработке</a>
					</div>
				</div>

				<!-- LegacyMarket -->
				<div class="project-card">
					<div class="project-content">
						<span class="tag">HTML</span>
						<h3>LegacyMarket</h3>
						<p>
							Маркетплейс софта (бывший RodnikMarket). Место, где
							живет полезное ПО для старых телефонов.
						</p>
						<a href="#" class="btn-link">открыть</a>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
